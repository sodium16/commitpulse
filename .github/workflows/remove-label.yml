name: Remove Label
on:
  push:
    branches: [fix/csrf-bypass-7498]
permissions:
  issues: write
  pull-requests: write
jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 8247,
                name: 'status:blocked'
              });
              console.log("Label removed successfully");
            } catch (e) {
              console.log("Error removing label (maybe it doesn't exist?):", e);
            }
