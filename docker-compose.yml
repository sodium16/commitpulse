services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commitpulse-app
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    environment:
      MONGODB_URI: mongodb://mongodb:27017/commitpulse
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:8
    container_name: commitpulse-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
